<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remorquage du Sud</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #c41e24;
      --red-dark: #8b1519;
      --dark: #1a1a1a;
      --darker: #111;
      --silver: #c0c0c0;
      --silver-light: #e0e0e0;
      --white: #fff;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--darker);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Subtle diagonal lines background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 10px,
        rgba(255,255,255,0.015) 10px,
        rgba(255,255,255,0.015) 11px
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 2rem 1.25rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    /* Logo */
    .logo-wrap {
      width: 450px;
      height: auto;
      animation: fadeInDown 0.6s ease-out;
    }
    .logo-wrap img {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 4px 24px rgba(196,30,36,0.35));
    }

    /* Owner name */
    .owner {
      font-family: 'Oswald', sans-serif;
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--silver-light);
      text-transform: uppercase;
      text-align: center;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }

    .subtext {
      font-family: 'Barlow', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-top: -1.5rem;
      animation: fadeIn 0.8s ease-out 0.25s both;
    }

    /* Divider */
    .divider {
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      animation: fadeIn 0.8s ease-out 0.3s both;
    }

    /* Action buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      animation: fadeInUp 0.7s ease-out 0.4s both;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      text-decoration: none;
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .action-btn:active {
      transform: scale(0.97);
    }
    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    }

    .action-btn .icon-circle {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn .icon-circle svg {
      width: 24px;
      height: 24px;
    }

    .action-btn .label {
      display: flex;
      flex-direction: column;
    }
    .action-btn .label small {
      font-weight: 400;
      font-size: 0.8rem;
      opacity: 0.65;
    }

    /* Button variants */
    .btn-call {
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
    }
    .btn-call .icon-circle {
      background: rgba(255,255,255,0.18);
    }

    .btn-map {
      background: linear-gradient(135deg, #2d2d2d, #222);
    }
    .btn-map .icon-circle {
      background: rgba(196,30,36,0.25);
    }

    .btn-contact {
      background: linear-gradient(135deg, #2d2d2d, #222);
    }
    .btn-contact .icon-circle {
      background: rgba(196,30,36,0.25);
    }

    /* Footer */
    .footer {
      margin-top: auto;
      padding: 1.5rem 0 0.5rem;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      text-align: center;
      animation: fadeIn 1s ease-out 0.7s both;
    }

    /* Animations */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo-wrap">
      <img src="banniere.png" alt="Remorquage du Sud">
    </div>

    <div class="owner">Remorquage du Sud</div>
    
    <div class="divider"></div>

    <div class="actions">

      <!-- Call -->
      <a href="tel:+15146917533" class="action-btn btn-call">
        <span class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </span>
        <span class="label">
          Appeler maintenant
          <small>(514) 691-7533</small>
        </span>
      </a>

      <!-- Google Maps -->
      <a href="https://maps.app.goo.gl/5c54RS4rkDdX57qA7" target="_blank" rel="noopener" class="action-btn btn-map">
        <span class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </span>
        <span class="label">
          Voir sur Google Entreprises
          <small>3523 Rue Joubert, Saint-Hubert</small>
        </span>
      </a>

      <!-- Download vCard -->
      <a href="vcard.vcf" download="Remorquage_du_Sud.vcf" class="action-btn btn-contact">
        <span class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <span class="label">
          Enregistrer le contact
          <small>Ajouter à vos contacts</small>
        </span>
      </a>

    </div>

    <div class="footer">
      © 2026 Remorquage du Sud
    </div>

  </div>

</body>
</html>
